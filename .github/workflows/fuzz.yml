name: Fuzz

# Cross-arch fuzz on Linux x86_64 — the production target. The local fuzz
# rounds during development are mac aarch64 only; this job re-fuzzes under
# Linux's different optimizer profile + sanitizer behaviour on every push
# to develop and once a day on schedule, time-boxed so CI minutes stay
# bounded.
#
# Charter note: cargo-fuzz and libfuzzer-sys are crates.io dev-only tools
# (same exemption as cargo-llvm-cov). They never enter the runtime
# dependency closure of any published kevy crate; each fuzz/ directory
# uses its own isolated workspace.

on:
  push:
    branches: [develop]
    paths:
      - 'crates/kevy-resp/**'
      - 'crates/kevy-bytes/**'
      - 'crates/kevy-persist/**'
      - '.github/workflows/fuzz.yml'
  pull_request:
    paths:
      - 'crates/kevy-resp/**'
      - 'crates/kevy-bytes/**'
      - 'crates/kevy-persist/**'
  schedule:
    # Daily at 08:00 UTC. Catches drift on develop even without a code push.
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      duration_seconds:
        description: 'Per-target fuzz duration (default 300)'
        required: false
        default: '300'

jobs:
  fuzz:
    name: Fuzz ${{ matrix.crate }}/${{ matrix.target }} (linux x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { crate: kevy-resp,    target: parse_command }
          - { crate: kevy-resp,    target: parse_reply }
          - { crate: kevy-bytes,   target: cross_arm }
          - { crate: kevy-persist, target: replay_aof }
    env:
      # Honour workflow_dispatch input; default to 300 s (5 min) per target.
      FUZZ_SECONDS: ${{ github.event.inputs.duration_seconds || '300' }}
    steps:
      - uses: actions/checkout@v4

      # cargo-fuzz needs the nightly toolchain (libfuzzer-sys + the
      # `-Zsanitizer` machinery aren't in stable). The repo root's
      # rust-toolchain.toml pins channel=stable, so we explicitly invoke
      # nightly per-command via `cargo +nightly …`.
      - name: Install nightly toolchain
        run: rustup toolchain install nightly --component rust-src --no-self-update

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Cache fuzz target build
        uses: actions/cache@v4
        with:
          path: |
            crates/${{ matrix.crate }}/fuzz/target
            crates/${{ matrix.crate }}/fuzz/corpus
          key: fuzz-${{ matrix.crate }}-${{ matrix.target }}-${{ runner.os }}-${{ hashFiles(format('crates/{0}/fuzz/Cargo.lock', matrix.crate)) }}
          restore-keys: |
            fuzz-${{ matrix.crate }}-${{ matrix.target }}-${{ runner.os }}-

      - name: Run ${{ matrix.crate }}/${{ matrix.target }} for ${{ env.FUZZ_SECONDS }}s
        working-directory: crates/${{ matrix.crate }}/fuzz
        # `cargo +nightly` overrides the stable channel pinned by the
        # repo-root rust-toolchain.toml; cargo-fuzz then inherits nightly
        # for its inner `cargo build` invocation. -max_total_time bounds
        # wall-clock so the job can't run away. Any libfuzzer crash trips
        # the step (non-zero exit) and uploads the offending input as an
        # artifact.
        run: cargo +nightly fuzz run ${{ matrix.target }} -- -max_total_time=${{ env.FUZZ_SECONDS }}

      - name: Upload crash artefacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crash-${{ matrix.crate }}-${{ matrix.target }}
          path: |
            crates/${{ matrix.crate }}/fuzz/artifacts/${{ matrix.target }}/
            crates/${{ matrix.crate }}/fuzz/corpus/${{ matrix.target }}/
          if-no-files-found: ignore
