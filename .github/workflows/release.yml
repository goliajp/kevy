name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'           # final release   (v1.0.0)
      - 'v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+'  # release candidate (v1.0.0-rc1)
      - 'v[0-9]+.[0-9]+.[0-9]+-beta[0-9]+'
  workflow_dispatch:                       # allow manual re-run from the Actions tab

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ───────────── verify the tag actually compiles cleanly ─────────────
  verify:
    name: Verify tag builds (release profile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: |
          rustup toolchain install stable --no-self-update
          rustup default stable
      - name: Build --release
        run: cargo build --workspace --release
      - name: Test --release
        run: cargo test --workspace --release --lib --tests

  # ───────────── cargo publish to crates.io (idempotent per crate) ─────────────
  # Triggered automatically on tag push. Walks every publishable crate in
  # dependency order; for each, attempts `cargo publish` and treats
  # "already uploaded" as a non-fatal skip (lets the workflow re-run after
  # a partial failure without re-publishing the crates that already landed).
  #
  # A pre-step (`Publish chain self-check`) reads `cargo metadata` to list
  # every workspace member whose `publish` field is unset (i.e. publishable
  # to crates.io) and aborts the job if the hand-maintained loop below
  # misses one. Without this, adding a new `kevy-*` crate without updating
  # the loop silently publishes everything except the new crate — the
  # v1.4.0 release tagged kevy-geo this way.
  #
  # Per-crate version tracking: kevy-embedded and kevy-client carry their
  # own explicit `version =` in Cargo.toml (independent additive growth);
  # everything else inherits the workspace version. The workflow doesn't
  # care — `cargo publish -p <crate>` reads each crate's own Cargo.toml.
  #
  # Rate limit: crates.io throttles NEW-crate publishes (burst-5 then
  # 1/~10 min), but version BUMPS on existing crates are not throttled —
  # all 16 crates are already on crates.io, so a tag-driven mass-republish
  # runs back-to-back with no sleeps.
  publish:
    name: cargo publish to crates.io
    runs-on: ubuntu-latest
    needs: verify
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - run: |
          rustup toolchain install stable --no-self-update
          rustup default stable

      # Hand-maintained chain order MUST cover every publishable crate.
      # Adding a `kevy-*` crate without updating the loop below silently
      # skips it during release (the v1.4.0 → v1.4.1 fix-up sequence was
      # caused by this). This step asserts the loop covers every member
      # whose `publish` field is unset before any publishing starts.
      - name: Publish chain self-check
        shell: bash
        run: |
          set -euo pipefail
          chain=$(printf '%s\n' \
            kevy-madvise kevy-sys kevy-hash kevy-config kevy-uring \
            kevy-bytes kevy-resp kevy-ring kevy-map kevy-geo \
            kevy-resp-client kevy-store \
            kevy-persist \
            kevy-replicate \
            kevy-rt kevy-embedded \
            kevy kevy-client \
            kevy-cluster-rw | sort -u)
          expected=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages | map(select(.publish == null)) | .[].name' \
            | sort -u)
          missing=$(comm -23 <(printf '%s\n' "$expected") <(printf '%s\n' "$chain"))
          extra=$(comm -13 <(printf '%s\n' "$expected") <(printf '%s\n' "$chain"))
          if [[ -n "$missing" ]]; then
            echo "::error::publish loop is missing publishable crates:"
            printf '  %s\n' $missing
            echo "fix: add them to the \`for c in ...\` list below in dependency order"
            exit 1
          fi
          if [[ -n "$extra" ]]; then
            echo "::error::publish loop lists crates not in workspace metadata:"
            printf '  %s\n' $extra
            echo "fix: remove them from the loop, or set their \`publish\` field"
            exit 1
          fi
          echo "✓ publish loop covers $(echo "$expected" | wc -l) publishable crates"

      - name: Publish chain
        shell: bash
        run: |
          set -euo pipefail
          publish_or_skip() {
            local crate=$1
            echo "::group::publish $crate"
            local log; log=$(mktemp)
            if cargo publish -p "$crate" 2>&1 | tee "$log"; then
              echo "::endgroup::"
              echo "✓ published $crate"
              return 0
            fi
            if grep -qE "already uploaded|crate version .* is already|already exists on crates.io" "$log"; then
              echo "::endgroup::"
              echo "↷ skipped $crate (already on crates.io)"
              return 0
            fi
            echo "::endgroup::"
            echo "✗ FAILED $crate" >&2
            return 1
          }
          # Topological order — leaves first, then crates that depend on
          # them. Same chain as RELEASE-DRY-RUN.md plus kevy-client at the
          # end (added in v1.3.0, depends on kevy-embedded + kevy-resp +
          # kevy-resp-client).
          for c in \
            kevy-madvise kevy-sys kevy-hash kevy-config kevy-uring \
            kevy-bytes kevy-resp kevy-ring kevy-map kevy-geo \
            kevy-resp-client kevy-store \
            kevy-persist \
            kevy-replicate \
            kevy-rt kevy-embedded \
            kevy kevy-client \
            kevy-cluster-rw; do
            publish_or_skip "$c"
          done
          echo "all publishable crates handled"

  # ───────────── build the kevy server binary for every supported target ─────────────
  # All targets build NATIVELY on their respective GitHub-hosted runner — each
  # runner type matches a target triple 1:1, no cross compilation. Linux gnu
  # (glibc) chosen over musl for ABI compat with mainstream server distros
  # (Debian/Ubuntu/Fedora/Amazon Linux). Windows is intentionally NOT in the
  # matrix: kevy-sys is a POSIX-sockets + epoll/kqueue + io_uring crate, so
  # Windows builds fail at compile time. Windows users run the multi-arch
  # Docker image instead — see .github/workflows/docker.yml.
  build-binaries:
    name: Build ${{ matrix.target }}
    needs: verify
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        shell: bash
        run: |
          rustup toolchain install stable --no-self-update
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Build kevy server binary
        shell: bash
        run: cargo build --release --bin kevy --target ${{ matrix.target }}

      # Package layout (same on every target):
      #   kevy-<tag>-<target>/
      #     kevy(.exe)
      #     README.md
      #     LICENSE-APACHE
      #     LICENSE-MIT
      #     kevy.toml.example
      - name: Stage release artifact
        shell: bash
        run: |
          # workflow_dispatch passes a branch ref, not a tag — use describe so
          # a manual rerun on develop produces a sensible "v1.0.0-rc4-2-gabc"
          # filename rather than a branch ref.
          tag="${GITHUB_REF#refs/tags/}"
          case "$tag" in
            refs/*) tag=$(git describe --tags --always) ;;
          esac
          stage="kevy-${tag}-${{ matrix.target }}"
          mkdir -p "$stage"
          cp "target/${{ matrix.target }}/release/kevy" "$stage/kevy"
          cp README.md LICENSE-APACHE LICENSE-MIT "$stage/"
          cp crates/kevy/kevy.toml.example "$stage/kevy.toml.example"
          tar -czf "${stage}.tar.gz" "$stage"
          shasum -a 256 "${stage}.tar.gz" > "${stage}.tar.gz.sha256"
          echo "ASSET=${stage}.tar.gz" >> "$GITHUB_ENV"
          echo "ASSET_SHA=${stage}.tar.gz.sha256" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: kevy-${{ matrix.target }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET_SHA }}
          if-no-files-found: error

  # ───────────── attach binaries + GitHub release notes ─────────────
  release-notes:
    name: Draft GitHub release
    runs-on: ubuntu-latest
    needs: [verify, publish, build-binaries]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0    # full history for changelog generation

      - name: Download all build artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          pattern: kevy-*
          merge-multiple: true

      - name: List staged assets (debug aid)
        run: ls -lh dist

      - name: Create / update release draft + attach binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag=${GITHUB_REF#refs/tags/}
          # rc / beta tags ship as Pre-release (shows the blue badge on GitHub);
          # plain v1.0.0-style tags become a stable release.
          prerelease_flag=""
          case "$tag" in
            *-rc*|*-beta*) prerelease_flag="--prerelease" ;;
          esac

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists — uploading assets (overwrite)."
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" \
              --draft \
              $prerelease_flag \
              --generate-notes \
              --title "$tag" \
              dist/*
          fi
