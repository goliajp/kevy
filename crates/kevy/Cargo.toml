[package]
name = "kevy"
description = "kevy — a pure-Rust, zero-dependency, Redis-compatible KV server."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
readme = "README.md"
keywords = ["redis", "kv", "key-value", "database", "valkey"]
categories = ["database-implementations", "caching", "network-programming"]

[lints]
workspace = true

[lib]
name = "kevy"
path = "src/lib.rs"

[[bin]]
name = "kevy"
path = "src/main.rs"

[dependencies]
kevy-sys = { path = "../kevy-sys", version = "1.0.1" }
kevy-resp = { path = "../kevy-resp", version = "1.0.1" }
kevy-store = { path = "../kevy-store", version = "1.0.1" }
kevy-rt = { path = "../kevy-rt", version = "1.0.1" }
kevy-config = { path = "../kevy-config", version = "1.0.1" }
kevy-persist = { path = "../kevy-persist", version = "1.0.1" }

[dev-dependencies]
kevy-bench = { path = "../kevy-bench" }
