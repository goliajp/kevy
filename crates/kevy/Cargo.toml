[package]
name = "kevy"
description = "kevy — a pure-Rust, zero-dependency, Redis-compatible KV server."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
readme = "README.md"
keywords = ["redis", "kv", "key-value", "database", "valkey"]
categories = ["database-implementations", "caching", "network-programming"]

[lints]
workspace = true

[lib]
name = "kevy"
path = "src/lib.rs"

[[bin]]
name = "kevy"
path = "src/main.rs"

[dependencies]
kevy-sys = { path = "../kevy-sys", version = "1.9.0" }
kevy-resp = { path = "../kevy-resp", version = "1.9.0" }
kevy-store = { path = "../kevy-store", version = "1.9.0" }
kevy-rt = { path = "../kevy-rt", version = "1.9.0" }
kevy-config = { path = "../kevy-config", version = "1.9.0" }
kevy-persist = { path = "../kevy-persist", version = "1.9.0" }
kevy-geo = { path = "../kevy-geo", version = "1.9.0" }

[dev-dependencies]
kevy-bench = { path = "../kevy-bench" }
# kevy-client is the URL-facade client; only used by integration tests
# that exercise BOTH server + client in one process (e.g. the RESP3
# Subscriber round-trip). Dev-only — never enters the published kevy
# binary's dep graph.
kevy-client = { path = "../kevy-client" }
