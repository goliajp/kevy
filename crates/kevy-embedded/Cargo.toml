[package]
name = "kevy-embedded"
description = "Embedded mode for kevy — in-process Redis-compatible KV without the server/runtime."
# kevy-embedded tracks its own additive growth (Store::Clone + pubsub bus
# from v1.1.0). Patch 1.1.2 picks up the workspace 1.1.1 chain that
# carries the kevy-persist replay_aof loud-summary fix (the mailrs SSH-
# stderr-in-AOF incident, 2026-06-03).
version = "1.1.2"
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/kevy-embedded"
readme = "README.md"
keywords = ["kevy", "redis", "kv", "embedded", "cache"]
categories = ["database-implementations", "caching", "embedded"]

[lints]
workspace = true

[dependencies]
kevy-store = { path = "../kevy-store", version = "1.1.1" }
kevy-persist = { path = "../kevy-persist", version = "1.1.1" }
