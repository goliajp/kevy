# Standalone (NOT a workspace member). Dev-only comparative bench
# against Rust-ecosystem competitors. Charter "0 deps on publish crates"
# is preserved — every competitor crate sits behind this Cargo.toml
# which never ships.

[workspace]

[package]
name = "kevy-hash-comparative-bench"
version = "0.0.0"
edition = "2024"
publish = false

[dependencies]
kevy-hash = { path = "../../../../crates/kevy-hash" }
ahash = { version = "0.8", default-features = false }
rustc-hash = "2"
fxhash = "0.2"
seahash = "4"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
