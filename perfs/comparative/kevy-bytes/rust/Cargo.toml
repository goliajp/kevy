# Standalone (NOT a workspace member) — dev-only comparative bench against
# Rust-ecosystem competitors. Each competitor crate is dev-dep'd here, never
# in the publishable `kevy-bytes` crate. Charter "0 deps on publish crates"
# is preserved (see [[feedback-pure-rust-no-c-principle]]).

[workspace]

[package]
name = "kevy-bytes-comparative-bench"
version = "0.0.0"
edition = "2024"
publish = false

[dependencies]
kevy-bytes = { path = "../../../../crates/kevy-bytes" }
smartstring = "1.0"
compact_str = "0.9"
smol_str = "0.3"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
